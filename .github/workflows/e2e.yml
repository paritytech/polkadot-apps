name: E2E

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    tx-demo:
        name: tx-demo
        runs-on: parity-default
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium
            - name: Run tx-demo E2E
              run: pnpm --filter @polkadot-apps/tx-demo test:e2e
              env:
                  CI: "true"
            - name: Upload Playwright report on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report-tx-demo
                  path: examples/tx-demo/playwright-report/
                  retention-days: 7
