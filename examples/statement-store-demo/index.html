<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@polkadot-apps/statement-store demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 1.5rem; }
    header { margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; color: #fff; }
    h2 { font-size: 1rem; margin: 1.2rem 0 0.5rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }

    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
    .panel-main { min-width: 0; }
    .panel-log { min-width: 0; position: sticky; top: 1.5rem; }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .panel-log { position: static; }
    }

    .meta { font-size: 0.85rem; color: #888; margin-bottom: 0.3rem; }
    .meta span { color: #ccc; font-family: monospace; }

    .action { background: #161616; padding: 0.8rem; border-radius: 6px; margin: 0.5rem 0; display: flex; gap: 0.5rem; align-items: center; }
    .action input { background: #222; border: 1px solid #333; color: #fff; padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.9rem; flex: 1; }
    .action button { background: #e6007a; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
    .action input:disabled { opacity: 0.5; cursor: default; }
    .action button:disabled { opacity: 0.5; cursor: default; }
    .action button:hover:not(:disabled) { background: #c80068; }

    #statement-log { background: #111; border-radius: 6px; padding: 0.6rem; max-height: calc(100vh - 6rem); overflow-y: auto; font-family: monospace; font-size: 0.8rem; line-height: 1.5; }
    .ts { color: #555; }
    .log-ok { color: #4caf50; }
    .log-err { color: #f44336; }
    .log-info { color: #888; }
  </style>
</head>
<body>
  <header>
    <h1 data-testid="app-heading">@polkadot-apps/statement-store demo</h1>
  </header>

  <div class="layout">
    <div class="panel-main">
      <div class="meta">Signer: <span id="connection-status" data-testid="connection-status">disconnected</span></div>
      <div class="meta">Provider: <span id="active-provider" data-testid="active-provider">-</span></div>
      <div class="meta">Account: <span id="account-address" data-testid="account-address">-</span></div>
      <div class="meta">Store: <span id="store-status" data-testid="store-status">disconnected</span></div>

      <h2>Publish statement</h2>
      <div class="action">
        <input id="publish-input" type="text" placeholder="Message text" data-testid="publish-input" value="hello from statement-store-demo" disabled />
        <button id="btn-publish" data-testid="btn-publish" disabled>Publish</button>
      </div>

      <h2>Publish with topic2</h2>
      <div class="action">
        <input id="publish-topic2-input" type="text" placeholder="Message text" data-testid="publish-topic2-input" value="topic2 message" disabled />
        <button id="btn-publish-topic2" data-testid="btn-publish-topic2" disabled>Publish (topic2)</button>
      </div>

      <h2>Channel write</h2>
      <div class="action">
        <input id="channel-input" type="text" placeholder="Channel value" data-testid="channel-input" value="presence-update" disabled />
        <button id="btn-channel-write" data-testid="btn-channel-write" disabled>Write channel</button>
      </div>

      <h2>Stats</h2>
      <div class="meta">Received: <span id="received-count" data-testid="received-count">0</span></div>
      <div class="meta">Channels: <span id="channel-count" data-testid="channel-count">0</span></div>
      <div class="meta">Channel value: <span id="channel-value" data-testid="channel-value">-</span></div>
      <div class="meta" style="display:none;">Topic: <span id="app-topic-hex" data-testid="app-topic-hex">-</span></div>
    </div>

    <div class="panel-log">
      <h2>Statement Log</h2>
      <div id="statement-log" data-testid="statement-log"></div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
