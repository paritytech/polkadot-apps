<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>@polkadot-apps/signer demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 1.5rem; }
    header { margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; color: #fff; }
    h2 { font-size: 1rem; margin: 1.2rem 0 0.5rem; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }

    .layout { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; align-items: start; }
    .panel-main { min-width: 0; }
    .panel-log { min-width: 0; position: sticky; top: 1.5rem; }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .panel-log { position: static; }
    }

    .meta { font-size: 0.85rem; color: #888; margin-bottom: 0.3rem; }
    .meta span { color: #ccc; font-family: monospace; word-break: break-all; }

    .accounts { background: #161616; padding: 0.6rem; border-radius: 6px; margin: 0.4rem 0; }
    .account-row { padding: 0.4rem 0.6rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; font-family: monospace; word-break: break-all; }
    .account-row:hover { background: #1e1e1e; }
    .account-row.selected { background: #2a1530; color: #fff; }
    .account-row .name { color: #e6007a; margin-right: 0.4rem; font-family: system-ui, sans-serif; }

    .action { background: #161616; padding: 0.8rem; border-radius: 6px; margin: 0.5rem 0; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .action input { background: #222; border: 1px solid #333; color: #fff; padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.9rem; flex: 1; min-width: 200px; }
    .action button { background: #e6007a; color: #fff; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
    .action input:disabled { opacity: 0.5; cursor: default; }
    .action button:disabled { opacity: 0.5; cursor: default; }
    .action button:hover:not(:disabled) { background: #c80068; }
    .action .result { font-family: monospace; font-size: 0.75rem; flex-basis: 100%; word-break: break-all; color: #4caf50; }
    .action .result.err { color: #f44336; }

    #event-log { background: #111; border-radius: 6px; padding: 0.6rem; max-height: calc(100vh - 6rem); overflow-y: auto; font-family: monospace; font-size: 0.8rem; line-height: 1.5; }
    .ts { color: #555; }
    .log-ok { color: #4caf50; }
    .log-err { color: #f44336; }
    .log-info { color: #888; }
    .log-state { color: #42a5f5; }
  </style>
</head>
<body>
  <header>
    <h1 data-testid="app-heading">@polkadot-apps/signer demo</h1>
  </header>

  <div class="layout">
    <div class="panel-main">
      <div class="meta">Status: <span id="connection-status" data-testid="connection-status">disconnected</span></div>
      <div class="meta">Provider: <span id="active-provider" data-testid="active-provider">-</span></div>
      <div class="meta">Selected: <span id="selected-address" data-testid="selected-address">-</span></div>

      <h2>Accounts</h2>
      <div class="accounts" id="accounts-list" data-testid="accounts-list">
        <div class="meta">No accounts yet — click Connect.</div>
      </div>

      <h2>Sign raw bytes</h2>
      <div class="action">
        <input id="raw-input" type="text" data-testid="raw-input" value="hello" placeholder="UTF-8 string to sign" disabled />
        <button id="btn-sign-raw" data-testid="btn-sign-raw" disabled>signRaw</button>
        <div class="result" id="last-signature" data-testid="last-signature"></div>
      </div>

      <h2>Lifecycle</h2>
      <div class="action">
        <button id="btn-connect" data-testid="btn-connect">Connect</button>
        <button id="btn-disconnect" data-testid="btn-disconnect" disabled>Disconnect</button>
        <button id="btn-reconnect" data-testid="btn-reconnect" disabled>Reconnect</button>
      </div>

      <div class="action">
        <span class="meta" style="flex:1;">Last error:</span>
        <div class="result err" id="last-error" data-testid="last-error"></div>
      </div>
    </div>

    <div class="panel-log">
      <h2>Event Log</h2>
      <div id="event-log" data-testid="event-log"></div>
    </div>
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
